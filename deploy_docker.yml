---
- name: Build a Self-Healing Docker Host
  hosts: all
  become: true
  tasks:
    - name: 1. Install required system packages
      apt:
        name: [ca-certificates, curl, gnupg, lsb-release]
        state: present
        update_cache: yes

    - name: 2. Create directory for Docker GPG key
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: 3. Add Docker’s official GPG key
      get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: 'a+r'

    - name: 4. Add Docker Repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: 5. Install Docker Engine and Plugin
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-buildx-plugin, docker-compose-plugin]
        state: present
        update_cache: yes

    - name: 6. Add vagrant user to docker group
      user:
        name: vagrant
        groups: docker
        append: yes

    - name: 7. Deploy Nginx Container
      community.docker.docker_container:
        name: web_server
        image: nginx:latest
        state: started
        restart_policy: always
        ports:
          - "8080:80"
