---
- name: Lab 1 - The Hardened Gateway
  hosts: localhost
  connection: local
  become: yes

  tasks:
    - name: 1. Ensure UFW is installed
      apt:
        name: ufw
        state: present
        update_cache: yes

    - name: 2. Set Default Policies
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: 3. Allow SSH
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: 4. Open Web Ports
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: ['80', '443', '81']
