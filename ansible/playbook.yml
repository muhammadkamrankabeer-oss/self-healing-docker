- hosts: all
  become: yes

  tasks:

    - name: 1. Update system
      apt:
        update_cache: yes

    - name: 2. Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present

    - name: 3. Install Docker
      apt:
        name: docker.io
        state: present

    - name: 4. Start Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: 5. Add vagrant user to docker group
      user:
        name: vagrant
        groups: docker
        append: yes

    - name: 6. Install Docker Compose
      apt:
        name: docker-compose
        state: present

    - name: 7. Create Docker directory
      file:
        path: /home/vagrant/docker
        state: directory

    - name: 8. Copy docker-compose file
      copy:
        src: ../docker/docker-compose.yml
        dest: /home/vagrant/docker/docker-compose.yml

    - name: 9. Run Docker containers
      command: docker-compose up -d
      args:
        chdir: /home/vagrant/docker
