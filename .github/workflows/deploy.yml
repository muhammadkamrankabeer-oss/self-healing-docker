name: 🚀 DevOps CI/CD Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:

  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Docker Compose
        run: |
          sudo apt update
          sudo apt install -y docker-compose

      - name: Validate compose file
        run: docker-compose -f docker/docker-compose.yml config

  test:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Install Docker + Compose
        run: |
          sudo apt update
          sudo apt install -y docker.io docker-compose

      - name: Start services
        run: |
          cd docker
          docker-compose up -d
          sleep 25

      - name: Check containers
        run: docker ps

      - name: Show logs (debug)
        run: |
          docker logs prometheus || true
          docker logs grafana || true

      - name: Cleanup
        run: |
          cd docker
          docker-compose down
